<!DOCTYPE html>
<html lang="en">
  <!-- بسم الله الرحمن الرحيم -->
  <head>
    <meta charset="utf-8" />
    <!-- Default favicon (fallback for unsupported browsers) -->
    <link rel="icon" href="/images/favicon-light.png" type="image/png">
    <!-- Light mode favicon -->
    <link rel="icon" href="/images/favicon-light.png" type="image/png" media="(prefers-color-scheme: light)">
    <!-- Dark mode favicon -->
    <link rel="icon" href="/images/favicon-dark.png" type="image/png" media="(prefers-color-scheme: dark)">

    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover" class="bg-zinc-50 dark:bg-zinc-950 transition-color">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
