<!doctype html>
<html lang="en">
  <!-- بسم الله الرحمن الرحيم -->
  <head>
    <meta charset="utf-8" />
    <!-- Default favicon (fallback for unsupported browsers) -->
    <link rel="icon" href="/images/favicon-light.png" type="image/png">
    <!-- Light mode favicon -->
    <link rel="icon" href="/images/favicon-light.png" type="image/png" media="(prefers-color-scheme: light)">
    <!-- Dark mode favicon -->
    <link rel="icon" href="/images/favicon-dark.png" type="image/png" media="(prefers-color-scheme: dark)">

    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&display=swap" rel="stylesheet">
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover" class="bg-zinc-950">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
